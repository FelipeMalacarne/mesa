apiVersion: v1
kind: Service
metadata:
  name: {{ include "mesa.fullname" . }}
  labels: {{ include "mesa.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8080
      protocol: TCP
      name: http
  selector: {{ include "mesa.selectorLabels" . | nindent 4 }}
